<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0ffe0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Download arrow body -->
  <rect x="55" y="24" width="18" height="48" rx="4" fill="url(#arrow)"/>
  <!-- Arrow head pointing down -->
  <polygon points="64,88 38,60 50,60 50,56 78,56 78,60 90,60" fill="url(#arrow)"/>
  <!-- Bottom line (tray) -->
  <rect x="32" y="96" width="64" height="8" rx="4" fill="url(#arrow)" opacity="0.85"/>
</svg>
